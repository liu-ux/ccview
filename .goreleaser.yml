version: 2

builds:
  - binary: ccview
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  header: |
    ## What's New

    ### Performance
    - **3-level lazy loading** — startup is instant; project metadata loads in the background, conversations load on demand per-project

    ### Project List
    - **Inline filter** — press `f` to filter projects by name; case-insensitive substring match, persists across navigation
    - **`-project` flag** — jump directly to a project: `ccview -project my-app`

    ### Conversation Viewer
    - **Tool call detail toggle** — press `t` to expand tool inputs, `T` for thinking blocks, `R` for inline tool results
    - **Split-pane rendering** — tool results render inline below their matching tool call
    - **Content search** — press `/` in the viewer for live search with `n`/`N` match navigation
    - **Turn numbers** — each message displays its conversation turn number in the header
    - **Turn navigation** — press `[`/`]` to jump to previous/next turn; press `\` + number + Enter to jump to a specific turn

    ### Search
    - **Session search overlay** — press `/` from the project list (global) or sidebar (project-scoped)
    - **Content scope toggle** — `Tab` switches between title search and full-content search (ripgrep/grep/SQL)
    - **Sidebar filter** — press `Alt+F` in search results to filter the sidebar to matching sessions

    ### Bug Fixes
    - Fixed Windows installer path handling
  github:
    owner: liu-ux
    name: ccview
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
